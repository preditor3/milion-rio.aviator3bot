<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDITOR MILIONÁRIO / BOT AVIATOR </title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

/* Moldura externa */
.wrapper{
  width:95%;
  max-width:400px;
  border:4px solid #00ff99;
  padding:15px;
}

/* Moldura interna */
.inner{
  border:3px solid #00ff99;
  padding:20px;
}

.logo-area{
  text-align:center;
  margin-bottom:25px;
}

.logo-area h1{
  color:#00ff99;
  font-size:22px;
  margin-bottom:10px;
}

.logo-area p{
  color:#00ffaa;
  font-size:12px;
  opacity:0.7;
}

.input-box{
  border:2px solid #00ff99;
  margin-bottom:15px;
  padding:10px;
}

.input-box input{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:#fff;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  background:#00ff99;
  border:none;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00cc77;
}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:12px;
}

.footer a{
  color:#00ff99;
  text-decoration:none;
  font-weight:bold;
}

.support{
  position:absolute;
  top:20px;
  right:20px;
  background:#00ff99;
  padding:10px;
  border-radius:50%;
  color:#000;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="support" onclick="window.open('https://wa.me/244958200096')">
<i class="fas fa-headset"></i>
</div>

<div class="wrapper">
  <div class="inner">

    <div class="logo-area">
      <h1>PREDITOR MILIONÁRIO / BOT AVIATOR </h1>
      <p>CRIAR CONTA</p>
    </div>

    <div class="input-box">
      <input type="text" placeholder="Nome completo" id="nome">
    </div>

    <div class="input-box">
      <input type="text" placeholder="+244 Telemóvel" id="telefone">
    </div>

    <div class="input-box">
      <input type="password" placeholder="Palavra-passe" id="senha">
    </div>

    <button onclick="cadastrar()">CRIAR CONTA</button>

    <div class="footer">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyChrog4zZNoK8HTMl1MTMD43U7HHxBMtVw",
  authDomain: "palpite3ad.firebaseapp.com",
  projectId: "palpite3ad",
  storageBucket: "palpite3ad.appspot.com",
  messagingSenderId: "435372004187",
  appId: "1:435372004187:android:3b7ee8b621fba094b2407e",
  databaseURL: "https://palpite3ad-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

function cadastrar(){
  const nome = document.getElementById("nome").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const senha = document.getElementById("senha").value;

  if(!nome || !telefone || !senha){
    alert("Preencha todos os campos.");
    return;
  }

  const emailFake = telefone + "@kerocapital.com";

  firebase.auth().createUserWithEmailAndPassword(emailFake, senha)
  .then((userCredential)=>{
    const uid = userCredential.user.uid;

    // Salvar dados do usuário no Realtime Database
    firebase.database().ref('users/' + uid).set({
      nome: nome,
      telefone: telefone,
      uid: uid
    });

    alert("Conta criada com sucesso!");
    window.location.href="login.html";
  })
  .catch((error)=>{
    alert("Erro: " + error.message);
  });
}
</script>

</body>
</html>
