<!DOCTYPE html>
<html lang="pt">
<head>

<title>PREDITOR MILIONÁRIO / BOT AVIATOR </title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    overflow-x:hidden;
}

/* Container geral */
.container{
    width:100%;
    max-width:500px;
    margin:0 auto;
    padding:20px 15px 40px 15px;
}

/* Título */
.titulo{
    width:100%;
    padding:20px;
    text-align:center;
    border:3px solid #007bff;
    font-size:20px;
    font-weight:bold;
    margin-bottom:30px;
}

/* Card */
.card{
    width:100%;
    padding:20px;
    border:3px solid #007bff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* Texto */
.card span{
    font-size:16px;
    font-weight:bold;
    font-style:italic;
}

/* Botão */
.botao{
    background:#007bff;
    padding:12px 20px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    font-size:14px;
    white-space:nowrap;
}

.botao:active{
    background:#3399ff;
}
</style>

</head>
<body>
