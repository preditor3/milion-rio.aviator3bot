<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDITOR MILIONÁRIO / BOT AVIATOR </title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}
.dashboard{
    width:380px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    text-align:center;
}
.header h1{font-size:20px;letter-spacing:2px;}
.status{margin-top:8px;font-size:14px;color:#00ff9d;}
.circle-wrapper{
    margin:30px auto;
    position:relative;
    width:220px;height:220px;
}
.progress-ring{
    position:absolute;width:100%;height:100%;
    border-radius:50%;
    background:conic-gradient(#00ffcc 0%, #ff00aa 50%, #00ffcc 100%);
    animation:spin 4s linear infinite;
}
.inner-circle{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:170px;height:170px;
    background:#111;border-radius:50%;
    display:flex;justify-content:center;align-items:center;
    box-shadow:inset 0 0 25px rgba(0,255,204,0.6);
    flex-direction:column;
}
.value{font-size:42px;font-weight:bold;}
.countdown{font-size:14px;color:#ffcc00;margin-top:6px;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.history{
    margin-top:15px;
    font-size:13px;
    opacity:0.8;
    max-height:80px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="dashboard">

<div class="header">
<h1>PREDITOR MILIONÁRIO AVIATOR </h1>
<div class="status" id="status">● Conectando...</div>
</div>

<div class="circle-wrapper">
<div class="progress-ring"></div>
<div class="inner-circle">
<div class="value" id="multiplicador">1.00X</div>
<div class="countdown" id="contador"></div>
</div>
</div>

<div class="history" id="historico"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyChrog4zZNoK8HTMl1MTMD43U7HHxBMtVw",
  databaseURL: "https://palpite3ad-default-rtdb.firebaseio.com",
  projectId: "palpite3ad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ultimoTimestamp = 0;

/* ===== RECEBER SINAL ===== */
db.ref("quantumSinal").on("value", snapshot=>{
    let dados = snapshot.val();
    if(!dados) return;

    document.getElementById("multiplicador").innerText = dados.valor;
    document.getElementById("status").innerText = dados.status;

    if(dados.timestamp !== ultimoTimestamp){
        tocarSom();
        ultimoTimestamp = dados.timestamp;
    }

    iniciarContador(dados.tempo);
});

/* ===== HISTÓRICO ===== */
db.ref("historicoQuantum").limitToLast(10).on("value", snapshot=>{
    let lista = "";
    snapshot.forEach(child=>{
        lista += child.val().valor + " | ";
    });
    document.getElementById("historico").innerText = "Últimos sinais: " + lista;
});

/* ===== CONTADOR ===== */
function iniciarContador(segundos){
    let tempo = segundos;
    const contador = document.getElementById("contador");
    const intervalo = setInterval(()=>{
        if(tempo <= 0){
            clearInterval(intervalo);
            contador.innerText = "";
        }else{
            contador.innerText = "Próximo sinal em: " + tempo + "s";
            tempo--;
        }
    },1000);
}

/* ===== SOM ===== */
function tocarSom(){
    let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    audio.play();
}
</script>

</body>
</html>
