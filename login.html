<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDITOR MILIONÁRIO / BOT AVIATOR </title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

/* Moldura externa */
.wrapper{
  width:95%;
  max-width:400px;
  border:4px solid #00aaff;
  padding:15px;
}

/* Moldura interna */
.inner{
  border:3px solid #00aaff;
  padding:20px;
}

.logo-area{
  text-align:center;
  margin-bottom:25px;
}

.logo-area h1{
  color:#00aaff;
  font-size:22px;
  margin-bottom:10px;
}

.logo-area p{
  color:#33bbff;
  font-size:12px;
  opacity:0.8;
}

.input-box{
  position:relative;
  border:2px solid #00aaff;
  margin-bottom:15px;
  padding:10px;
}

.input-box input{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:#fff;
  font-size:14px;
}

.input-box input::placeholder{
  color:#66ccff;
}

.input-box i{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  color:#66ccff;
  cursor:pointer;
}

.checkbox{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:15px;
  color:#66ccff;
  font-size:12px;
}

button{
  width:100%;
  padding:12px;
  background:#00aaff;
  border:none;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0088cc;
}

.support{
  position:absolute;
  top:20px;
  right:20px;
  background:#00aaff;
  padding:10px;
  border-radius:50%;
  color:#000;
  cursor:pointer;
  transition:0.3s;
}

.support:hover{
  background:#0088cc;
}
</style>
</head>
<body>

<div class="support" onclick="window.open('https://wa.me/244958200096')">
<i class="fas fa-headset"></i>
</div>

<div class="wrapper">
  <div class="inner">

    <div class="logo-area">
      <h1>PRE-MILIONÁRIO AVIATOR </h1>
      <p>ACESSO SEGURO</p>
    </div>

    <div class="input-box">
      <input type="text" placeholder="+244 Telemóvel" id="telefone">
    </div>

    <div class="input-box">
      <input type="password" placeholder="Palavra-passe" id="senha">
      <i class="fas fa-eye" id="toggleSenha"></i>
    </div>

    <div class="checkbox">
      <input type="checkbox" id="lembrar">
      <label for="lembrar">PERMANECER CONECTADO</label>
    </div>

    <button onclick="entrar()">ENTRAR</button>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyChrog4zZNoK8HTMl1MTMD43U7HHxBMtVw",
  authDomain: "palpite3ad.firebaseapp.com",
  projectId: "palpite3ad",
  storageBucket: "palpite3ad.appspot.com",
  messagingSenderId: "435372004187",
  appId: "1:435372004187:android:3b7ee8b621fba094b2407e",
  databaseURL: "https://palpite3ad-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

// Função de login
function entrar(){
  const telefone = document.getElementById("telefone").value.trim();
  const senha = document.getElementById("senha").value;

  if(!telefone || !senha){
    alert("Preencha todos os campos.");
    return;
  }

  const emailFake = telefone + "@kerocapital.com";

  firebase.auth().signInWithEmailAndPassword(emailFake, senha)
  .then(()=>{
    window.location.href="casas.html";
  })
  .catch(error=>{
    alert("Erro: " + error.message);
  });
}

// Toggle senha visível/não visível
const toggleSenha = document.getElementById('toggleSenha');
const senhaInput = document.getElementById('senha');

toggleSenha.addEventListener('click', ()=>{
  if(senhaInput.type === 'password'){
    senhaInput.type = 'text';
    toggleSenha.classList.remove('fa-eye');
    toggleSenha.classList.add('fa-eye-slash');
  }else{
    senhaInput.type = 'password';
    toggleSenha.classList.remove('fa-eye-slash');
    toggleSenha.classList.add('fa-eye');
  }
});
</script>

</body>
</html>
